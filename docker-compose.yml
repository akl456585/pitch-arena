services:
  pitch-arena:
    build: .
    container_name: pitch-arena
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - pitch-arena-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - utayo_default

volumes:
  pitch-arena-data:

networks:
  utayo_default:
    external: true
