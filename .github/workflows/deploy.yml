name: Deploy to Alicloud SAS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set SSH target
        run: |
          echo "SSH_CMD=ssh -i /home/admin/.ssh/utayo_deploy -o StrictHostKeyChecking=no admin@172.19.0.234" >> $GITHUB_ENV
          echo "SSH_TARGET=admin@172.19.0.234" >> $GITHUB_ENV

      - name: Sync code to app server
        run: |
          set -e
          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env*' \
            -e "ssh -i /home/admin/.ssh/utayo_deploy -o StrictHostKeyChecking=no" \
            ./ $SSH_TARGET:~/pitch-arena/

      - name: Create env file
        run: |
          $SSH_CMD bash -s << 'SCRIPT'
          set -e
          cat > ~/pitch-arena/.env.production << EOF
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ vars.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ vars.DB_NAME }}
          EOF
          SCRIPT

      - name: Run migrations
        run: |
          $SSH_CMD bash -s << 'SCRIPT'
          set -e
          cd ~/pitch-arena
          docker build --target migrator -t pitch-arena-migrator .
          docker run --rm --env-file .env.production --network utayo_default pitch-arena-migrator
          SCRIPT

      - name: Build and deploy
        run: |
          $SSH_CMD bash -s << 'SCRIPT'
          set -e
          cd ~/pitch-arena
          docker compose up -d --build --remove-orphans
          SCRIPT

      - name: Health check
        run: |
          $SSH_CMD bash -s << 'SCRIPT'
          set -e
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' pitch-arena 2>/dev/null | grep -q healthy; then
              echo "Deploy successful — pitch-arena is running"
              break
            fi
            sleep 2
          done
          SCRIPT

      - name: Diagnostic — verify routes and DB
        run: |
          $SSH_CMD bash -s << 'SCRIPT'
          set -e
          echo "=== Container info ==="
          docker ps --filter name=pitch-arena --format '{{.Names}} {{.Status}} {{.Image}}'
          echo "=== Image created ==="
          docker inspect pitch-arena --format '{{.Created}} (image: {{.Config.Image}})'
          echo "=== /api/health from inside docker network ==="
          docker run --rm --network utayo_default curlimages/curl:latest -sS -m 5 -w "\nHTTP %{http_code}\n" http://pitch-arena:3000/api/health || echo "curl failed"
          echo "=== / from inside docker network (head) ==="
          docker run --rm --network utayo_default curlimages/curl:latest -sS -m 5 -o /dev/null -w "HTTP %{http_code}\n" http://pitch-arena:3000/ || echo "curl failed"
          echo "=== Container logs (last 30) ==="
          docker logs pitch-arena --tail 30
          SCRIPT
